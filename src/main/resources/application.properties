spring.application.name=ledger-api

# Use environment variables if available; fallback to local values for development
frontend.url=${FRONTEND_URL:http://localhost:5173}

# OAuth2 Client Configuration (Set these as ENV vars on Render!)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

server.servlet.session.timeout=24h
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# Database Configuration
# Render will provide DATABASE_URL in a format like: jdbc:postgresql://host:port/db?user=...
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/entity_ledger}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Monkeys13!}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.security=TRACE
